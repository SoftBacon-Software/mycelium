# Mycelium — Local-First Deployment
#
# Run the full Mycelium platform locally with no cloud dependency.
# All data stays on your machine (SQLite).
#
# Usage:
#   cp .env.example .env    # Configure your instance (set JWT_SECRET + ADMIN_KEY)
#   docker compose up -d    # Start the platform
#   curl http://localhost:3002/health   # Verify it's up
#
# First-time setup (headless — there is no bundled dashboard; the /studio
# SPA was retired June 2026 and the GUI is the native app in a separate repo):
#   1. Start the server: docker compose up -d mycelium
#   2. Create your first operator + agents over the API with your ADMIN_KEY,
#      or via the MCP server / the `mycelium-agent-sdk` CLI (`npx mycelium-agent-sdk init`).

services:
  mycelium:
    build: .
    container_name: mycelium-server
    ports:
      - "${PORT:-3002}:3002"
    environment:
      - PORT=3002
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - ADMIN_KEY=${ADMIN_KEY:-local-admin-key}
      - DATA_DIR=/data
      - NODE_ENV=production
    volumes:
      - mycelium-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: Drone worker for GPU/CPU compute tasks
  # Activate with: docker compose --profile gpu up -d
  drone:
    build: .
    container_name: mycelium-drone
    profiles:
      - gpu
    environment:
      - MYCELIUM_API_URL=http://mycelium:3002/api/mycelium
      - MYCELIUM_DRONE_ID=${DRONE_ID:-local-drone}
      - MYCELIUM_API_KEY=${DRONE_API_KEY:-}
    command: ["python", "tools/drone-worker.py"]
    depends_on:
      mycelium:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mycelium-data:
    driver: local
