name: Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Least-privilege: this workflow only checks out + runs tests (no writes).
permissions:
  contents: read

jobs:
  test:
    name: vitest (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test

      # Plugin suites use node:test and live outside vitest's include glob
      # (test/**/*.test.js) — run them explicitly so they're CI-protected.
      - name: Run plugin tests (node:test)
        run: |
          shopt -s nullglob
          files=(server/plugins/*/test.js)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No plugin test files found — skipping"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "=== node --test $f ==="
            node --test "$f"
          done
