<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mycelium · Family</title>
<meta name="description" content="What's happening in the house right now.">
<link rel="icon" type="image/svg+xml" href="/studio/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #111110;
  --surface: #1C1917;
  --surface-raised: #292524;
  --border: rgba(168, 147, 120, 0.08);
  --border-hover: rgba(168, 147, 120, 0.18);
  --text: #F5F0E8;
  --text-dim: #A8937B;
  --text-muted: #6B5E50;
  --accent: #D4A847;       /* Jarvis */
  --accent-light: #E0BE6A;
  --accent-dim: rgba(212, 168, 71, 0.12);
  --green: #7A9E7E;
  --green-dim: rgba(122, 158, 126, 0.12);
  --blue: #5E9EA0;
  --blue-dim: rgba(94, 158, 160, 0.12);
  --pink: #C76A8C;          /* Clara (future) */
  --pink-dim: rgba(199, 106, 140, 0.12);
  --red: #C45B3E;
  --radius: 10px;
}

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.4;
}

.container { position: relative; z-index: 1; max-width: 880px; margin: 0 auto; padding: 20px 20px 60px; }

.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.header h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px; font-weight: 600; color: var(--accent);
  letter-spacing: 0.08em; text-transform: uppercase;
}
.header h1 .dot { color: var(--text-muted); margin: 0 6px; }
.refresh-indicator { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
.refresh-indicator .live-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); margin-right: 6px; animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  text-align: center;
}
.stat-value { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 600; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

.section { margin-bottom: 28px; }
.section-title {
  font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em;
  font-weight: 600; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
}

.row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 6px;
  font-size: 14px;
}
.row .agent-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.06em;
  flex-shrink: 0;
}
.agent-tag.jarvis { color: var(--accent); background: var(--accent-dim); }
.agent-tag.clara  { color: var(--pink);   background: var(--pink-dim); }
.agent-tag.family { color: var(--green);  background: var(--green-dim); }
.agent-tag.other  { color: var(--text-dim); background: rgba(168,147,120,0.06); }

.row .time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--text-dim);
  min-width: 92px;
}
.row .title { flex: 1; color: var(--text); }
.row .location { font-size: 12px; color: var(--text-muted); }

.empty {
  padding: 14px;
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  text-align: center;
  font-size: 13px;
  font-style: italic;
}

.groceries-list {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px;
}
.groceries-list .grocery-line { padding: 4px 0; font-size: 14px; color: var(--text); }
.groceries-list .grocery-line:not(:last-child) { border-bottom: 1px solid var(--border); }
.groceries-meta { margin-top: 8px; font-size: 11px; color: var(--text-muted); text-align: right; }

.footer {
  margin-top: 30px; padding-top: 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
}
.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

.agents-strip { display: flex; gap: 8px; align-items: center; }
.agent-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px; border-radius: 12px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  background: var(--surface); border: 1px solid var(--border);
}
.agent-pill .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
.agent-pill.online .pill-dot { background: var(--green); }
.agent-pill.online { color: var(--text); }
.agent-pill:not(.online) { color: var(--text-muted); }

.banner-error {
  background: rgba(196,91,62,0.08); border: 1px solid rgba(196,91,62,0.25);
  color: var(--red); padding: 8px 12px; border-radius: var(--radius); font-size: 12px;
  margin-bottom: 16px;
}
.hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Mycelium <span class="dot">·</span> Family</h1>
    <div class="refresh-indicator">
      <span class="live-dot"></span><span id="refresh-time">connecting...</span>
    </div>
  </div>

  <div id="error-banner" class="banner-error hidden"></div>

  <div class="stats">
    <div class="stat-card"><div id="stat-events-today" class="stat-value">—</div><div class="stat-label">Events Today</div></div>
    <div class="stat-card"><div id="stat-open-reminders" class="stat-value">—</div><div class="stat-label">Open Reminders</div></div>
    <div class="stat-card"><div id="stat-events-week" class="stat-value">—</div><div class="stat-label">This Week</div></div>
  </div>

  <div class="section">
    <div class="section-title">Today</div>
    <div id="today-events"></div>
    <div id="today-reminders"></div>
  </div>

  <div class="section">
    <div class="section-title">This Week</div>
    <div id="week-events"></div>
  </div>

  <div class="section">
    <div class="section-title">Open Reminders</div>
    <div id="open-reminders"></div>
  </div>

  <div class="section">
    <div class="section-title">Groceries</div>
    <div id="groceries"></div>
  </div>

  <div class="footer">
    <div class="agents-strip" id="agents-strip">agents loading…</div>
    <div><a href="/studio" target="_blank">Open full dashboard →</a></div>
  </div>
</div>

<script>
var JARVIS_BASE = 'http://localhost:7777';

function agentClass(name) {
  if (!name) return 'other';
  var n = name.toLowerCase();
  if (n.indexOf('jarvis') === 0) return 'jarvis';
  if (n.indexOf('clara') === 0)  return 'clara';
  if (n.indexOf('family') === 0) return 'family';
  return 'other';
}

function fmtTime(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function fmtDayTime(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  var day = d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
  var t = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  return day + ' · ' + t;
}

function isToday(iso) {
  if (!iso) return false;
  var d = new Date(iso);
  var n = new Date();
  return d.toDateString() === n.toDateString();
}

function renderRow(parent, agentName, time, title, location) {
  var row = document.createElement('div');
  row.className = 'row';
  var tag = document.createElement('span');
  tag.className = 'agent-tag ' + agentClass(agentName);
  tag.textContent = agentName;
  row.appendChild(tag);
  if (time) {
    var t = document.createElement('span');
    t.className = 'time';
    t.textContent = time;
    row.appendChild(t);
  }
  var tt = document.createElement('span');
  tt.className = 'title';
  tt.textContent = title;
  row.appendChild(tt);
  if (location) {
    var l = document.createElement('span');
    l.className = 'location';
    l.textContent = '@ ' + location;
    row.appendChild(l);
  }
  parent.appendChild(row);
}

function emptyState(parent, text) {
  var d = document.createElement('div');
  d.className = 'empty';
  d.textContent = text;
  parent.appendChild(d);
}

function renderTodayEvents(events) {
  var p = document.getElementById('today-events');
  p.textContent = '';
  var today = events.filter(function (e) { return isToday(e.start); });
  if (today.length === 0) return;
  today.forEach(function (e) {
    renderRow(p, e.calendar, fmtTime(e.start), e.title, e.location);
  });
}

function renderTodayReminders(reminders) {
  var p = document.getElementById('today-reminders');
  p.textContent = '';
  var today = reminders.filter(function (r) { return isToday(r.due); });
  today.forEach(function (r) {
    renderRow(p, r.list, fmtTime(r.due) || 'today', '☐ ' + r.name, '');
  });
}

function renderWeekEvents(events) {
  var p = document.getElementById('week-events');
  p.textContent = '';
  var week = events.filter(function (e) { return !isToday(e.start); });
  if (week.length === 0) { emptyState(p, 'Nothing scheduled this week.'); return; }
  week.forEach(function (e) {
    renderRow(p, e.calendar, fmtDayTime(e.start), e.title, e.location);
  });
}

function renderOpenReminders(reminders) {
  var p = document.getElementById('open-reminders');
  p.textContent = '';
  var rest = reminders.filter(function (r) { return !isToday(r.due); });
  if (rest.length === 0) { emptyState(p, 'No open reminders.'); return; }
  rest.forEach(function (r) {
    var when = r.due ? fmtDayTime(r.due) : 'no date';
    renderRow(p, r.list, when, '☐ ' + r.name, '');
  });
}

function renderGroceries(notes) {
  var p = document.getElementById('groceries');
  p.textContent = '';
  var g = (notes || []).filter(function (n) { return n.title === 'Groceries'; })[0];
  if (!g || !g.tail_lines || g.tail_lines.length === 0) {
    emptyState(p, 'No grocery list yet.');
    return;
  }
  var wrap = document.createElement('div');
  wrap.className = 'groceries-list';
  g.tail_lines.forEach(function (line) {
    var d = document.createElement('div');
    d.className = 'grocery-line';
    d.textContent = '• ' + line;
    wrap.appendChild(d);
  });
  var meta = document.createElement('div');
  meta.className = 'groceries-meta';
  meta.textContent = 'Showing last ' + g.tail_lines.length + ' of ' + g.total_lines + ' lines';
  wrap.appendChild(meta);
  p.appendChild(wrap);
}

function renderStats(snap, pub) {
  document.getElementById('stat-events-today').textContent = snap.stats.events_today;
  document.getElementById('stat-open-reminders').textContent = snap.stats.open_reminders;
  document.getElementById('stat-events-week').textContent = snap.stats.events_this_week;
}

function renderAgents(pub) {
  var strip = document.getElementById('agents-strip');
  strip.textContent = '';
  var agents = (pub && pub.agents) || [];
  if (agents.length === 0) {
    strip.textContent = 'no agents online';
    return;
  }
  agents.forEach(function (a) {
    var pill = document.createElement('span');
    pill.className = 'agent-pill' + (a.online ? ' online' : '');
    var dot = document.createElement('span');
    dot.className = 'pill-dot';
    pill.appendChild(dot);
    var n = document.createElement('span');
    n.textContent = a.name;
    pill.appendChild(n);
    strip.appendChild(pill);
  });
}

function showError(msg) {
  var b = document.getElementById('error-banner');
  b.textContent = msg;
  b.classList.remove('hidden');
}
function hideError() {
  document.getElementById('error-banner').classList.add('hidden');
}

function refresh() {
  var snapP = fetch(JARVIS_BASE + '/api/family/snapshot').then(function (r) { return r.json(); });
  var pubP = fetch('/api/mycelium/public/activity').then(function (r) { return r.json(); });
  Promise.all([snapP, pubP])
    .then(function (results) {
      var snap = results[0];
      var pub = results[1];
      hideError();
      renderStats(snap, pub);
      renderTodayEvents(snap.today_events || []);
      renderTodayReminders(snap.open_reminders || []);
      renderWeekEvents(snap.week_events || []);
      renderOpenReminders(snap.open_reminders || []);
      renderGroceries(snap.household_notes || []);
      renderAgents(pub);
      document.getElementById('refresh-time').textContent = 'Updated ' + new Date().toLocaleTimeString();
    })
    .catch(function (err) {
      console.error('refresh error:', err);
      showError('Jarvis snapshot unreachable: ' + err.message);
      document.getElementById('refresh-time').textContent = 'connection error';
    });
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
