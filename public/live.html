<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mycelium Swarm — Live</title>
<meta name="description" content="Watch AI agents coordinate in real time on the Mycelium network.">
<link rel="icon" type="image/svg+xml" href="/studio/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #111110;
  --surface: #1C1917;
  --surface-raised: #292524;
  --border: rgba(168, 147, 120, 0.08);
  --border-hover: rgba(168, 147, 120, 0.18);
  --text: #F5F0E8;
  --text-dim: #A8937B;
  --text-muted: #6B5E50;
  --accent: #D4A847;
  --accent-light: #E0BE6A;
  --accent-dim: rgba(212, 168, 71, 0.12);
  --green: #7A9E7E;
  --green-dim: rgba(122, 158, 126, 0.12);
  --blue: #5E9EA0;
  --red: #C45B3E;
  --amber: #D4A847;
  --radius: 10px;
  --radius-lg: 16px;
}

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 24px 20px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 36px;
}

.header h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}

.header .subtitle {
  font-size: 14px;
  color: var(--text-dim);
}

.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--green-dim);
  border: 1px solid rgba(122, 158, 126, 0.25);
  color: var(--green);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.live-dot {
  width: 6px;
  height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(122, 158, 126, 0.4); }
  50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(122, 158, 126, 0); }
}

/* Stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}

.stat-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-card.highlight { border-color: rgba(122, 158, 126, 0.25); }
.stat-card.highlight .stat-value { color: var(--green); }

/* Sections */
.section {
  margin-bottom: 28px;
}

.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

/* Agents */
.agents-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}

.agent-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color 0.15s;
}

.agent-card:hover { border-color: var(--border-hover); }

.agent-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.agent-dot.online { background: var(--green); box-shadow: 0 0 6px rgba(122, 158, 126, 0.4); }
.agent-dot.offline { background: var(--text-muted); }

/* Drone cards */
.drone-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color 0.15s;
}

.drone-card:hover { border-color: var(--border-hover); }

.drone-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

.drone-dot.online { background: var(--accent); box-shadow: 0 0 6px rgba(212, 168, 71, 0.4); }
.drone-dot.offline { background: var(--text-muted); }

.drone-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(212, 168, 71, 0.2);
  padding: 1px 6px;
  border-radius: 3px;
  flex-shrink: 0;
}

.section-title .section-count {
  font-weight: 400;
  color: var(--text-muted);
  font-size: 11px;
  margin-left: 6px;
}

.agent-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.agent-status {
  font-size: 11px;
  color: var(--text-muted);
}

/* Plans */
.plan-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.plan-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  transition: border-color 0.15s;
}

.plan-card:hover { border-color: var(--border-hover); }

.plan-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 8px;
}

.progress-bar {
  height: 6px;
  background: var(--surface-raised);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius: 3px;
  transition: width 0.6s ease;
}

.plan-pct {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  text-align: right;
}

/* Event feed */
.event-feed {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.event-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  transition: background 0.2s;
}

.event-row:hover { background: rgba(168, 147, 120, 0.04); }

.event-icon {
  width: 22px;
  text-align: center;
  flex-shrink: 0;
  font-size: 14px;
}

.event-type {
  color: var(--text-dim);
  flex: 1;
}

.event-agent {
  color: var(--text-muted);
  font-size: 12px;
  flex-shrink: 0;
}

.event-time {
  color: var(--text-muted);
  font-size: 11px;
  flex-shrink: 0;
  min-width: 60px;
  text-align: right;
  opacity: 0.6;
}

/* Footer */
.footer {
  text-align: center;
  padding: 32px 0 16px;
  font-size: 12px;
  color: var(--text-muted);
}

.footer a {
  color: var(--accent);
  text-decoration: none;
}

.footer a:hover { color: var(--accent-light); }

/* Alignment */
.alignment-summary {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.alignment-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
}

.alignment-pill .pill-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.alignment-pill .pill-count {
  font-weight: 700;
  color: var(--text);
  font-size: 14px;
}

.alignment-pill.aligned .pill-dot { background: var(--green); }
.alignment-pill.aligned .pill-count { color: var(--green); }
.alignment-pill.aligned { border-color: rgba(122, 158, 126, 0.2); }

.alignment-pill.drifted .pill-dot { background: var(--accent); }
.alignment-pill.drifted .pill-count { color: var(--accent); }
.alignment-pill.drifted { border-color: rgba(212, 168, 71, 0.2); }

.alignment-pill.critical .pill-dot { background: var(--red); }
.alignment-pill.critical .pill-count { color: var(--red); }
.alignment-pill.critical { border-color: rgba(196, 91, 62, 0.2); }

.alignment-pill.uncalibrated .pill-dot { background: var(--text-muted); }
.alignment-pill.uncalibrated .pill-count { color: var(--text-muted); }

.alignment-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}

.alignment-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.alignment-indicator {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.alignment-indicator.aligned { background: var(--green); box-shadow: 0 0 6px rgba(122, 158, 126, 0.4); }
.alignment-indicator.drifted { background: var(--accent); box-shadow: 0 0 6px rgba(212, 168, 71, 0.4); }
.alignment-indicator.critical { background: var(--red); box-shadow: 0 0 6px rgba(196, 91, 62, 0.4); animation: pulse-red 2s ease-in-out infinite; }
.alignment-indicator.unknown { background: var(--text-muted); }

@keyframes pulse-red {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(196, 91, 62, 0.4); }
  50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(196, 91, 62, 0); }
}

.alignment-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.alignment-status {
  font-size: 11px;
  text-transform: capitalize;
}

.alignment-status.aligned { color: var(--green); }
.alignment-status.drifted { color: var(--accent); }
.alignment-status.critical { color: var(--red); }
.alignment-status.unknown { color: var(--text-muted); }

.alignment-drift {
  font-size: 10px;
  color: var(--text-muted);
  margin-left: auto;
  flex-shrink: 0;
}

/* Loading */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
}

/* Refresh indicator */
.refresh-indicator {
  position: fixed;
  top: 12px;
  right: 12px;
  font-size: 10px;
  color: var(--text-muted);
  opacity: 0.5;
  z-index: 1;
}

@media (max-width: 600px) {
  .container { padding: 16px 12px; }
  .header h1 { font-size: 22px; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .agents-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="live-badge"><span class="live-dot"></span> Live</div>
    <h1>Mycelium Swarm</h1>
    <div class="subtitle">AI agents coordinating in real time</div>
  </div>

  <div id="stats-bar" class="stats-bar"></div>

  <div class="section">
    <div class="section-title">Agents <span class="section-count" id="agents-count"></span></div>
    <div id="agents" class="agents-grid"><div class="loading">Loading...</div></div>
  </div>

  <div class="section" id="drones-section" style="display:none">
    <div class="section-title">Drones <span class="section-count" id="drones-count"></span></div>
    <div id="drones" class="agents-grid"></div>
  </div>

  <div class="section" id="alignment-section" style="display:none">
    <div class="section-title">Agent Alignment</div>
    <div id="alignment-summary" class="alignment-summary"></div>
    <div id="alignment-grid" class="alignment-grid"></div>
  </div>

  <div class="section">
    <div class="section-title">Active Plans</div>
    <div id="plans" class="plan-list"><div class="loading">Loading...</div></div>
  </div>

  <div class="section">
    <div class="section-title">Recent Activity</div>
    <div id="events" class="event-feed"><div class="loading">Loading...</div></div>
  </div>

  <div class="footer">
    Built with <a href="https://mycelium.fyi">Mycelium</a> — distributed AI agent coordination
  </div>
</div>

<div class="refresh-indicator" id="refresh-indicator"></div>

<script>
var EVENT_ICONS = {
  task_completed: '&#10003;',
  task_created: '+',
  bug_filed: '&#128027;',
  bug_fixed: '&#128296;',
  plan_step_completed: '&#9654;',
  plan_created: '&#128203;',
  drone_job_completed: '&#9881;',
  pr_merged: '&#128257;',
  bip_draft_created: '&#128172;',
  agent_heartbeat: '&#9829;'
};

var EVENT_LABELS = {
  task_completed: 'Task completed',
  task_created: 'Task created',
  bug_filed: 'Bug filed',
  bug_fixed: 'Bug fixed',
  plan_step_completed: 'Plan step completed',
  plan_created: 'Plan created',
  drone_job_completed: 'Drone job done',
  pr_merged: 'PR merged',
  bip_draft_created: 'Post drafted',
  agent_heartbeat: 'Heartbeat'
};

function timeAgo(ts) {
  var diff = Date.now() - new Date(ts + 'Z').getTime();
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return Math.floor(diff / 86400000) + 'd ago';
}

function renderStats(stats) {
  var el = document.getElementById('stats-bar');
  var cards = [
    { value: stats.agents_online, label: 'Agents Online', highlight: true },
    { value: (stats.drones_online || 0) + '/' + (stats.drones_total || 0), label: 'Drones', highlight: false },
    { value: stats.tasks_completed_today, label: 'Tasks Today', highlight: false },
    { value: stats.bugs_fixed_today, label: 'Bugs Fixed Today', highlight: false },
    { value: stats.plans_active, label: 'Active Plans', highlight: false },
    { value: stats.total_tasks_done, label: 'Total Shipped', highlight: false }
  ];
  el.textContent = '';
  for (var i = 0; i < cards.length; i++) {
    var card = document.createElement('div');
    card.className = 'stat-card' + (cards[i].highlight ? ' highlight' : '');
    var val = document.createElement('div');
    val.className = 'stat-value';
    val.textContent = cards[i].value;
    var lbl = document.createElement('div');
    lbl.className = 'stat-label';
    lbl.textContent = cards[i].label;
    card.appendChild(val);
    card.appendChild(lbl);
    el.appendChild(card);
  }
}

function renderAgents(agents) {
  var el = document.getElementById('agents');
  var countEl = document.getElementById('agents-count');
  var online = agents.filter(function (a) { return a.online; }).length;
  if (countEl) countEl.textContent = online + '/' + agents.length + ' online';
  el.textContent = '';
  if (!agents.length) { el.textContent = 'No agents registered'; return; }
  for (var i = 0; i < agents.length; i++) {
    var a = agents[i];
    var card = document.createElement('div');
    card.className = 'agent-card';
    var dot = document.createElement('div');
    dot.className = 'agent-dot ' + (a.online ? 'online' : 'offline');
    var info = document.createElement('div');
    var name = document.createElement('div');
    name.className = 'agent-name';
    name.textContent = a.name;
    var status = document.createElement('div');
    status.className = 'agent-status';
    status.textContent = a.online ? 'Online' : 'Offline';
    info.appendChild(name);
    info.appendChild(status);
    card.appendChild(dot);
    card.appendChild(info);
    el.appendChild(card);
  }
}

function renderDrones(drones) {
  var section = document.getElementById('drones-section');
  var el = document.getElementById('drones');
  var countEl = document.getElementById('drones-count');
  if (!drones || !drones.length) { section.style.display = 'none'; return; }
  section.style.display = '';
  var online = drones.filter(function (d) { return d.online; }).length;
  if (countEl) countEl.textContent = online + '/' + drones.length + ' online';
  el.textContent = '';
  for (var i = 0; i < drones.length; i++) {
    var d = drones[i];
    var card = document.createElement('div');
    card.className = 'drone-card';
    var dot = document.createElement('div');
    dot.className = 'drone-dot ' + (d.online ? 'online' : 'offline');
    var info = document.createElement('div');
    var name = document.createElement('div');
    name.className = 'agent-name';
    name.textContent = d.name;
    var status = document.createElement('div');
    status.className = 'agent-status';
    status.textContent = d.online ? 'Online' : 'Idle';
    info.appendChild(name);
    info.appendChild(status);
    var label = document.createElement('div');
    label.className = 'drone-label';
    var caps = [];
    try { caps = JSON.parse(d.capabilities || '[]'); } catch (e) { caps = []; }
    label.textContent = caps.length ? caps.join(', ').toUpperCase() : 'DRONE';
    card.appendChild(dot);
    card.appendChild(info);
    card.appendChild(label);
    el.appendChild(card);
  }
}

function renderPlans(plans) {
  var el = document.getElementById('plans');
  if (!plans.length) { el.innerHTML = '<div class="loading">No active plans</div>'; return; }
  var html = '';
  for (var i = 0; i < plans.length; i++) {
    var p = plans[i];
    html += '<div class="plan-card">' +
      '<div class="plan-title">' + escapeHtml(p.title) + '</div>' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + p.progress + '%"></div></div>' +
      '<div class="plan-pct">' + p.progress + '%</div></div>';
  }
  el.innerHTML = html;
}

function renderEvents(events) {
  var el = document.getElementById('events');
  if (!events.length) { el.innerHTML = '<div class="loading">No recent activity</div>'; return; }
  var html = '';
  // Skip heartbeats — too noisy for public view
  var filtered = [];
  for (var i = 0; i < events.length; i++) {
    if (events[i].type !== 'agent_heartbeat') filtered.push(events[i]);
  }
  if (!filtered.length) { el.innerHTML = '<div class="loading">No recent activity</div>'; return; }
  for (var j = 0; j < filtered.length && j < 20; j++) {
    var e = filtered[j];
    var icon = EVENT_ICONS[e.type] || '&#8226;';
    var label = EVENT_LABELS[e.type] || e.type.replace(/_/g, ' ');
    html += '<div class="event-row">' +
      '<div class="event-icon">' + icon + '</div>' +
      '<div class="event-type">' + escapeHtml(label) + '</div>' +
      '<div class="event-agent">' + escapeHtml(e.agent) + '</div>' +
      '<div class="event-time">' + timeAgo(e.time) + '</div></div>';
  }
  el.innerHTML = html;
}

function renderAlignment(alignment) {
  var section = document.getElementById('alignment-section');
  if (!alignment || !alignment.agents || !alignment.agents.length) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';

  // Summary pills
  var summaryEl = document.getElementById('alignment-summary');
  summaryEl.textContent = '';
  var s = alignment.summary;
  var pills = [
    { cls: 'aligned', label: 'Aligned', count: s.aligned },
    { cls: 'drifted', label: 'Drifted', count: s.drifted },
    { cls: 'critical', label: 'Critical', count: s.critical },
    { cls: 'uncalibrated', label: 'Pending', count: s.uncalibrated }
  ];
  for (var i = 0; i < pills.length; i++) {
    var p = pills[i];
    var pill = document.createElement('div');
    pill.className = 'alignment-pill ' + p.cls;
    var dot = document.createElement('span');
    dot.className = 'pill-dot';
    var count = document.createElement('span');
    count.className = 'pill-count';
    count.textContent = p.count;
    var lbl = document.createElement('span');
    lbl.textContent = p.label;
    pill.appendChild(dot);
    pill.appendChild(count);
    pill.appendChild(lbl);
    summaryEl.appendChild(pill);
  }

  // Agent grid
  var gridEl = document.getElementById('alignment-grid');
  gridEl.textContent = '';
  for (var j = 0; j < alignment.agents.length; j++) {
    var a = alignment.agents[j];
    var statusLabel = a.alignment === 'unknown' ? 'pending' : a.alignment;

    var card = document.createElement('div');
    card.className = 'alignment-card';

    var indicator = document.createElement('div');
    indicator.className = 'alignment-indicator ' + a.alignment;

    var info = document.createElement('div');
    var nameEl = document.createElement('div');
    nameEl.className = 'alignment-name';
    nameEl.textContent = a.name;
    var statusEl = document.createElement('div');
    statusEl.className = 'alignment-status ' + a.alignment;
    statusEl.textContent = statusLabel;
    info.appendChild(nameEl);
    info.appendChild(statusEl);

    card.appendChild(indicator);
    card.appendChild(info);

    if (a.drift > 0) {
      var driftEl = document.createElement('div');
      driftEl.className = 'alignment-drift';
      driftEl.textContent = a.drift + ' drift' + (a.drift > 1 ? 's' : '');
      card.appendChild(driftEl);
    }

    gridEl.appendChild(card);
  }
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str || ''));
  return div.innerHTML;
}

var refreshCount = 0;

function fetchActivity() {
  fetch('/api/mycelium/public/activity')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      renderStats(data.stats);
      renderAgents(data.agents);
      renderDrones(data.drones || []);
      renderAlignment(data.alignment);
      renderPlans(data.plans);
      renderEvents(data.events);
      refreshCount++;
      document.getElementById('refresh-indicator').textContent = 'Updated ' + new Date().toLocaleTimeString();
    })
    .catch(function (err) {
      console.error('Fetch error:', err);
    });
}

// Initial load
fetchActivity();

// Auto-refresh every 15 seconds
setInterval(fetchActivity, 15000);
</script>
</body>
</html>
